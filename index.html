<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Client Map</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        .tier-card-p1 { border-top: 5px solid #7c3aed; }
        .tier-card-p2 { border-top: 5px solid #2563eb; }
        .tier-card-p3 { border-top: 5px solid #0891b2; }
        .tier-card-p4 { border-top: 5px solid #64748b; }
        .tier-card-x { border-top: 5px solid #e2e8f0; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAAvxcoVE8ZpvG4OC5VKuNnfzuLxidL83U",
            authDomain: "points-dashboard-78c0b.firebaseapp.com",
            projectId: "points-dashboard-78c0b",
            storageBucket: "points-dashboard-78c0b.firebasestorage.app",
            messagingSenderId: "456742475224",
            appId: "1:456742475224:web:7b73cf082db54daa488ead"
        };

        const APP_ID = "client-map-master-v1";
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const TIERS = [
            { id: "P1", label: "P1 - High Value", color: "bg-purple-600", light: "bg-purple-50", text: "text-purple-700" },
            { id: "P2", label: "P2 - Mid Tier", color: "bg-blue-600", light: "bg-blue-50", text: "text-blue-700" },
            { id: "P3", label: "P3 - Emerging", color: "bg-cyan-600", light: "bg-cyan-50", text: "text-cyan-700" },
            { id: "P4", label: "P4 - Lite", color: "bg-slate-600", light: "bg-slate-50", text: "text-slate-700" },
            { id: "x", label: "Unranked / Other", color: "bg-slate-300", light: "bg-slate-50", text: "text-slate-400" }
        ];

        const SERVICE_GROUPS = [
            { 
                id: 'social', 
                label: 'Social Media', 
                icon: 'Share',
                options: ['Organic Posting', 'Community Management', 'Paid Social', 'Profile Audit', 'Influencer Marketing']
            },
            { 
                id: 'ppc', 
                label: 'Paid Search', 
                icon: 'Cursor',
                options: ['Google Ads', 'Meta Ads', 'TikTok Ads', 'LinkedIn Ads', 'Retargeting', 'Search Console']
            },
            { 
                id: 'creative', 
                label: 'Creative / Web', 
                icon: 'Palette',
                options: ['Web Design', 'Video Production', 'SEO Strategy', 'Brand Identity', 'Copywriting', 'E-mail Marketing']
            },
            { 
                id: 'adhoc', 
                label: 'Ad Hoc / Technical', 
                icon: 'Zap',
                options: ['Hosting', 'CRM Setup', 'Technical SEO', 'Consultation', 'Reporting']
            }
        ];

        // --- 2. ASSETS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Search: <g><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></g>,
                Trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                Edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></g>,
                Share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" />,
                Cursor: <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3zM13 13l6 6" />,
                Palette: <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />,
                Zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 3. MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [showModal, setShowModal] = useState(false);
            const [editingClient, setEditingClient] = useState(null);

            const [form, setForm] = useState({
                name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: "",
                selectedServices: [] // Array of strings like "social:Google Ads"
            });

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    if (u) setUser(u);
                    else auth.signInAnonymously();
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const unsub = ref.onSnapshot(async (snap) => {
                    setClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                return () => unsub();
            }, [user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const data = { ...form, updatedAt: Date.now() };
                if (editingClient) await ref.doc(editingClient.id).update(data);
                else await ref.add(data);
                closeModal();
            };

            const closeModal = () => {
                setForm({ name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: "", selectedServices: [] });
                setEditingClient(null);
                setShowModal(false);
            };

            const toggleService = (groupId, option) => {
                const serviceKey = `${groupId}:${option}`;
                setForm(prev => {
                    const current = prev.selectedServices || [];
                    const next = current.includes(serviceKey)
                        ? current.filter(s => s !== serviceKey)
                        : [...current, serviceKey];
                    return { ...prev, selectedServices: next };
                });
            };

            const groupedClients = useMemo(() => {
                const filtered = clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
                return TIERS.reduce((acc, tier) => {
                    acc[tier.id] = filtered.filter(c => (c.tier || "x").includes(tier.id));
                    return acc;
                }, {});
            }, [clients, searchTerm]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="w-12 h-12 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Mapping Portfolios</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col p-6 md:p-10 max-w-[1400px] mx-auto animate-in">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-3 rounded-2xl text-white shadow-xl">
                                <Icon name="Users" size={28} />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter text-slate-900 uppercase leading-none">Client Map</h1>
                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mt-2">Agency Service Dashboard</p>
                            </div>
                        </div>
                        
                        <div className="flex w-full md:w-auto gap-3">
                            <div className="flex-1 md:w-80 flex items-center bg-white px-4 rounded-2xl border border-slate-200 shadow-sm transition-all focus-within:ring-2 ring-indigo-500/20">
                                <Icon name="Search" className="text-slate-300 mr-2" />
                                <input type="text" placeholder="Search account..." className="w-full py-4 text-sm font-semibold border-none focus:ring-0 bg-transparent" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-indigo-600 text-white px-8 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-2">
                                <Icon name="Plus" size={16} /> New Record
                            </button>
                        </div>
                    </header>

                    <div className="space-y-24">
                        {TIERS.map(tier => groupedClients[tier.id]?.length > 0 && (
                            <section key={tier.id} className="animate-in">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className={`px-5 py-2 rounded-full ${tier.color} text-white font-black text-[10px] uppercase tracking-[0.2em] shadow-lg`}>
                                        {tier.label}
                                    </div>
                                    <div className="h-px bg-slate-200 flex-1"></div>
                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">{groupedClients[tier.id].length} Managed</span>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {groupedClients[tier.id].map(client => (
                                        <div key={client.id} className={`bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col relative transition-all hover:shadow-2xl group tier-card-${tier.id.toLowerCase()}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex gap-1.5">
                                                    {SERVICE_GROUPS.map(group => {
                                                        const isActive = (client.selectedServices || []).some(s => s.startsWith(`${group.id}:`));
                                                        return isActive ? (
                                                            <div key={group.id} className="p-2 bg-indigo-50 text-indigo-600 rounded-xl" title={group.label}>
                                                                <Icon name={group.icon} size={14} />
                                                            </div>
                                                        ) : null;
                                                    })}
                                                </div>
                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => { setEditingClient(client); setForm(client); setShowModal(true); }} className="p-2 text-slate-300 hover:text-indigo-600 transition-colors"><Icon name="Edit" size={16}/></button>
                                                    <button onClick={() => { if(confirm("Permanently delete?")) db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients').doc(client.id).delete(); }} className="p-2 text-slate-300 hover:text-red-500 transition-colors"><Icon name="Trash" size={16}/></button>
                                                </div>
                                            </div>

                                            <h3 className="text-2xl font-black text-slate-900 mb-6 leading-tight group-hover:text-indigo-600 transition-colors">{client.name}</h3>

                                            <div className="space-y-6 flex-1 mb-8">
                                                {SERVICE_GROUPS.map(group => {
                                                    const selected = (client.selectedServices || []).filter(s => s.startsWith(`${group.id}:`)).map(s => s.split(':')[1]);
                                                    if (selected.length === 0) return null;
                                                    
                                                    return (
                                                        <div key={group.id} className="animate-in">
                                                            <div className="flex items-center gap-2 mb-2 text-slate-400">
                                                                <Icon name={group.icon} size={10} />
                                                                <span className="text-[9px] font-black uppercase tracking-widest">{group.label}</span>
                                                            </div>
                                                            <div className="flex flex-wrap gap-1.5 mb-2">
                                                                {selected.map(s => (
                                                                    <span key={s} className="px-2 py-0.5 bg-slate-50 border border-slate-100 rounded-md text-[9px] font-bold text-slate-600 uppercase">{s}</span>
                                                                ))}
                                                            </div>
                                                            {client[group.id] && (
                                                                <p className="text-[10px] text-slate-400 italic leading-snug pl-1">"{client[group.id]}"</p>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {client.proactive && (
                                                <div className="mt-auto pt-6 border-t border-slate-50">
                                                    <p className="text-[9px] font-black uppercase text-indigo-500 mb-2 tracking-widest flex items-center gap-2">
                                                        <Icon name="Check" size={10} /> Strategic Note
                                                    </p>
                                                    <p className="text-[11px] text-slate-500 italic leading-relaxed line-clamp-2">
                                                        {client.proactive}
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* ENTRY MODAL */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/70 backdrop-blur-md">
                            <div className="bg-white w-full max-w-4xl rounded-[3rem] shadow-2xl overflow-hidden animate-in border border-white/20">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">{editingClient ? 'Edit Client Record' : 'Create Client Record'}</h2>
                                    <button onClick={closeModal} className="p-2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="X" size={24} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-10 space-y-8 max-h-[80vh] overflow-y-auto custom-scrollbar">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-6">
                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Client Name</label>
                                                <input required type="text" className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 font-bold" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Priority Tier</label>
                                                <select className="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm" value={form.tier} onChange={e => setForm({...form, tier: e.target.value})}>
                                                    {TIERS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Proactive Strategy</label>
                                                <textarea rows={4} className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" value={form.proactive} onChange={e => setForm({...form, proactive: e.target.value})} placeholder="What are the scale opportunities?" />
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <label className="text-[10px] font-black uppercase text-slate-400 block tracking-widest">Service Inventory</label>
                                            <div className="space-y-4">
                                                {SERVICE_GROUPS.map(group => (
                                                    <div key={group.id} className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                        <div className="flex items-center gap-3 mb-4">
                                                            <div className="p-2 bg-white rounded-lg shadow-sm text-indigo-600"><Icon name={group.icon} size={14} /></div>
                                                            <span className="font-extrabold text-xs uppercase tracking-wider text-slate-700">{group.label}</span>
                                                        </div>
                                                        <div className="flex flex-wrap gap-2 mb-4">
                                                            {group.options.map(opt => (
                                                                <button 
                                                                    key={opt}
                                                                    type="button"
                                                                    onClick={() => toggleService(group.id, opt)}
                                                                    className={`px-3 py-1.5 rounded-xl text-[10px] font-bold uppercase transition-all ${
                                                                        (form.selectedServices || []).includes(`${group.id}:${opt}`)
                                                                            ? 'bg-indigo-600 text-white shadow-md'
                                                                            : 'bg-white text-slate-400 hover:text-slate-600'
                                                                    }`}
                                                                >
                                                                    {opt}
                                                                </button>
                                                            ))}
                                                        </div>
                                                        <input 
                                                            type="text" 
                                                            className="w-full p-3 bg-white/50 border-none rounded-xl text-xs font-semibold focus:ring-0 placeholder:text-slate-300"
                                                            placeholder={`Specific details for ${group.label}...`}
                                                            value={form[group.id]}
                                                            onChange={e => setForm({...form, [group.id]: e.target.value})}
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <button className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-xl hover:bg-indigo-600 transition-all">
                                        Save Client Mapping
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
