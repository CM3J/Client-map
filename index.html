<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Client Map</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; color: #0f172a; }
        
        /* Tier visual markers based on your sheet labels */
        .tier-p1 { border-left: 6px solid #7c3aed; } /* Purple */
        .tier-p2 { border-left: 6px solid #2563eb; } /* Blue */
        .tier-p3 { border-left: 6px solid #0891b2; } /* Cyan */
        .tier-p4 { border-left: 6px solid #64748b; } /* Slate */
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAAvxcoVE8ZpvG4OC5VKuNnfzuLxidL83U",
            authDomain: "points-dashboard-78c0b.firebaseapp.com",
            projectId: "points-dashboard-78c0b",
            storageBucket: "points-dashboard-78c0b.firebasestorage.app",
            messagingSenderId: "456742475224",
            appId: "1:456742475224:web:7b73cf082db54daa488ead"
        };

        const APP_ID = "client-map-master-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 2. ASSETS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Search: <g><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></g>,
                Trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                Edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                Import: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></g>,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Map: <g><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 3. MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showModal, setShowModal] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [csvInput, setCsvInput] = useState("");

            const [form, setForm] = useState({
                name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: ""
            });

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    if (u) setUser(u);
                    else auth.signInAnonymously();
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const unsub = ref.onSnapshot(snap => {
                    setClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                return () => unsub();
            }, [user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const data = { ...form, updatedAt: Date.now() };
                if (editingClient) await ref.doc(editingClient.id).update(data);
                else await ref.add(data);
                closeModal();
            };

            const closeModal = () => {
                setForm({ name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: "" });
                setEditingClient(null);
                setShowModal(false);
            };

            const handleImport = async () => {
                if (!csvInput.trim()) return;
                
                // Splitting by lines
                const rows = csvInput.split(/\r?\n/).filter(r => r.trim() !== "");
                
                // Logic to find where data starts:
                // Google Sheet copy-paste often uses tabs. CSV uses commas.
                // We'll detect the separator and skip headers.
                const firstRow = rows[0];
                const delimiter = firstRow.includes('\t') ? '\t' : ',';
                
                // Find index where 'Customer' appears to skip noise rows
                let startIndex = rows.findIndex(r => r.toLowerCase().includes('customer')) + 1;
                if (startIndex === 0) startIndex = 0; // If no header found, assume start

                const dataRows = rows.slice(startIndex);
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const batch = db.batch();

                dataRows.forEach(row => {
                    // Splitting by delimiter (Tabs or Commas)
                    const parts = row.split(delimiter).map(p => p.trim().replace(/^"|"$/g, ''));
                    
                    // Based on your Sheet structure:
                    // Index 0: Row metadata (Skip)
                    // Index 1: Customer Name
                    // Index 2: Tier (Active)
                    // Index 3: Social
                    // Index 4: PPC
                    // Index 5: Creative
                    // Index 6: Ad Hoc
                    // Index 7: Proactive Notes
                    
                    const name = parts[1];
                    if (name && name !== "" && name.toLowerCase() !== "customer") {
                        const newDoc = ref.doc();
                        batch.set(newDoc, {
                            name: name,
                            tier: parts[2] || "P4",
                            social: parts[3] || "",
                            ppc: parts[4] || "",
                            creative: parts[5] || "",
                            adhoc: parts[6] || "",
                            proactive: parts[7] || "",
                            updatedAt: Date.now()
                        });
                    }
                });

                await batch.commit();
                setShowImport(false);
                setCsvInput("");
            };

            const filteredClients = useMemo(() => {
                return clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()))
                              .sort((a, b) => a.tier.localeCompare(b.tier));
            }, [clients, searchTerm]);

            const getTierColor = (t) => {
                const tier = t.toUpperCase();
                if (tier.includes("P1")) return "text-purple-600 bg-purple-50";
                if (tier.includes("P2")) return "text-blue-600 bg-blue-50";
                if (tier.includes("P3")) return "text-cyan-600 bg-cyan-50";
                return "text-slate-600 bg-slate-50";
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="w-12 h-12 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Pulling Client Data</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col p-6 md:p-12 max-w-7xl mx-auto animate-in">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-8">
                        <div>
                            <h1 className="text-4xl font-extrabold tracking-tighter text-slate-900 uppercase">Agency Master Map</h1>
                            <div className="flex gap-4 mt-2 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                <span>{clients.length} Accounts Mapped</span>
                                <span className="flex items-center gap-1"><div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div> Live Sync Active</span>
                            </div>
                        </div>
                        <div className="flex w-full md:w-auto gap-4">
                            <div className="flex-1 md:w-80 flex items-center bg-white px-4 rounded-2xl border shadow-sm">
                                <Icon name="Search" className="text-slate-300 mr-2" />
                                <input type="text" placeholder="Filter map..." className="w-full py-4 text-sm font-semibold border-none focus:ring-0 bg-transparent" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setShowImport(true)} className="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-colors" title="Sync from Spreadsheet">
                                <Icon name="Import" size={20} />
                            </button>
                            <button onClick={() => setShowModal(true)} className="bg-indigo-600 text-white px-8 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center gap-2">
                                <Icon name="Plus" size={16} /> Add Client
                            </button>
                        </div>
                    </header>

                    {clients.length === 0 ? (
                        <div className="flex-1 flex flex-col items-center justify-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-200 animate-in">
                            <div className="p-6 bg-slate-50 rounded-full mb-6"><Icon name="Map" size={48} className="text-slate-300" /></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">Map is Empty</h2>
                            <p className="text-slate-400 text-sm max-w-xs text-center mb-8 text-center px-6 leading-relaxed">Your account map is currently blank. Copy and paste your Google Sheet data to populate it.</p>
                            <button onClick={() => setShowImport(true)} className="flex items-center gap-2 px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-lg">
                                <Icon name="Import" size={16} /> Sync Master Sheet
                            </button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filteredClients.map(client => (
                                <div key={client.id} className={`bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col relative transition-all hover:shadow-2xl hover:-translate-y-1 group tier-${client.tier.toLowerCase().substring(0,2)}`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${getTierColor(client.tier)}`}>
                                            {client.tier}
                                        </span>
                                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => { setEditingClient(client); setForm(client); setShowModal(true); }} className="p-2 text-slate-300 hover:text-indigo-600"><Icon name="Edit" size={16}/></button>
                                            <button onClick={() => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients').doc(client.id).delete()} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash" size={16}/></button>
                                        </div>
                                    </div>

                                    <h3 className="text-2xl font-extrabold text-slate-900 mb-6 leading-tight">{client.name}</h3>

                                    <div className="space-y-5 mb-8 flex-1">
                                        {['social', 'ppc', 'creative', 'adhoc'].map(field => client[field] && (
                                            <div key={field}>
                                                <p className="text-[9px] font-black uppercase text-slate-400 mb-1 tracking-widest leading-none">{field}</p>
                                                <p className="text-[11px] font-bold text-slate-600 leading-relaxed whitespace-pre-wrap">{client[field]}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-auto pt-6 border-t border-slate-50">
                                        <p className="text-[9px] font-black uppercase text-indigo-400 mb-2 tracking-widest flex items-center gap-2">
                                            <Icon name="Check" size={10} /> Proactive Strategy
                                        </p>
                                        <p className="text-xs text-slate-500 italic leading-relaxed whitespace-pre-wrap bg-slate-50/50 p-4 rounded-xl">
                                            {client.proactive || "No strategic initiatives set."}
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ENTRY MODAL */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden animate-in">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-xl font-extrabold uppercase tracking-tighter">{editingClient ? 'Update Account' : 'New Mapping'}</h2>
                                    <button onClick={closeModal} className="p-2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="X" size={24} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-10 grid grid-cols-2 gap-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Client Name</label>
                                        <input required type="text" className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 font-bold" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Priority Tier</label>
                                        <select className="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm" value={form.tier} onChange={e => setForm({...form, tier: e.target.value})}>
                                            <option>P1 - 40K+</option>
                                            <option>P2 - 20-39K</option>
                                            <option>P3 - 10-19K</option>
                                            <option>{"P4 - <10K"}</option>
                                            <option>Inactive</option>
                                        </select>
                                    </div>
                                    {['social', 'ppc', 'creative', 'adhoc'].map(field => (
                                        <div key={field} className="col-span-2 md:col-span-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest capitalize font-bold">{field} Details</label>
                                            <textarea rows={2} className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-xs font-semibold" value={form[field]} onChange={e => setForm({...form, [field]: e.target.value})} />
                                        </div>
                                    ))}
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest font-bold">Proactive Strategy</label>
                                        <textarea rows={3} className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-xs font-semibold" value={form.proactive} onChange={e => setForm({...form, proactive: e.target.value})} />
                                    </div>
                                    <button className="col-span-2 bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-indigo-600 transition-all mt-4">Save Mapping</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* IMPORT MODAL */}
                    {showImport && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl p-10 animate-in text-center">
                                <h2 className="text-2xl font-black uppercase tracking-tighter mb-4">Pull Spreadsheet Data</h2>
                                <p className="text-sm text-slate-500 mb-8 font-medium leading-relaxed px-4">Open your Google Sheet, select the entire table (including Customer and Active columns), copy it, and paste it below.</p>
                                <textarea rows={10} className="w-full p-6 rounded-3xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-[10px] font-mono mb-8 custom-scrollbar leading-relaxed" placeholder="Paste range here..." value={csvInput} onChange={e => setCsvInput(e.target.value)} />
                                <div className="flex gap-4">
                                    <button onClick={() => setShowImport(false)} className="flex-1 p-5 rounded-3xl border font-bold text-xs uppercase tracking-widest hover:bg-slate-50 transition-all">Cancel</button>
                                    <button onClick={handleImport} className="flex-1 bg-indigo-600 text-white p-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Execute Import</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
