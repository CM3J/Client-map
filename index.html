<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Client Map</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; color: #0f172a; }
        
        .tier-p1 { border-left: 6px solid #7c3aed; }
        .tier-p2 { border-left: 6px solid #2563eb; }
        .tier-p3 { border-left: 6px solid #0891b2; }
        .tier-p4 { border-left: 6px solid #64748b; }
        .tier-x { border-left: 6px solid #e2e8f0; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAAvxcoVE8ZpvG4OC5VKuNnfzuLxidL83U",
            authDomain: "points-dashboard-78c0b.firebaseapp.com",
            projectId: "points-dashboard-78c0b",
            storageBucket: "points-dashboard-78c0b.firebasestorage.app",
            messagingSenderId: "456742475224",
            appId: "1:456742475224:web:7b73cf082db54daa488ead"
        };

        const APP_ID = "client-map-master-v1";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // FULL ROSTER FROM SPREADSHEET
        const BASELINE_DATA = [
            { name: "TBE Africa Pty (Ltd)", tier: "P2", social: "Social - 3 per week Ryan", ppc: "Meta, Google", creative: "Web design", adhoc: "", proactive: "LinkedIn opportunity? Follow-up on web design proposal." },
            { name: "BikeMarket.co.za", tier: "P4", social: "", ppc: "", creative: "x", adhoc: "Kinda look at their website once in a while", proactive: "" },
            { name: "Drone Ops (Pty) Ltd", tier: "P3", social: "", ppc: "Low level brand awareness", creative: "Ade hoc", adhoc: "", proactive: "Social as an opportunity" },
            { name: "Bophelong Construction (Pty) Ltd", tier: "P4", social: "1 post a week dependant on share", ppc: "", creative: "SEO work", adhoc: "", proactive: "" },
            { name: "Bushtec", tier: "P3", social: "", ppc: "Lead Gen, Safari, RCSSA", creative: "Ad hoc web work", adhoc: "Social media video", proactive: "" },
            { name: "Fetola", tier: "P2", social: "", ppc: "Brand awareness", creative: "x", adhoc: "x", proactive: "" },
            { name: "Molare Meats", tier: "P2", social: "1 a week", ppc: "Brand awareness", creative: "Label designs etc", adhoc: "", proactive: "" },
            { name: "Superior Filtration", tier: "P3", social: "", ppc: "Retargetting campaign", creative: "SEO !!!!", adhoc: "", proactive: "" },
            { name: "EBK", tier: "P2", social: "", ppc: "Meta and Tik Tok", creative: "Hosting", adhoc: "", proactive: "Track the goals we need to hit? GHL -" },
            { name: "Thorndale Safari", tier: "x", social: "", ppc: "Google ads", creative: "", adhoc: "Web ad hoc", proactive: "" },
            { name: "JH Group- Trennerys", tier: "P3", social: "", ppc: "x", creative: "", adhoc: "", proactive: "" },
            { name: "CORNICE", tier: "x", social: "x", ppc: "Scaling Revenue month on month", creative: "x", adhoc: "New Shopify Site", proactive: "What is happening with the 3D Videos? Delight the Client." },
            { name: "LODEC", tier: "x", social: "", ppc: "x", creative: "x", adhoc: "", proactive: "What is the status of the growth promised?" },
            { name: "The Usual", tier: "P1", social: "x", ppc: "x", creative: "x", adhoc: "", proactive: "" },
            { name: "Max Hotels", tier: "P1", social: "x", ppc: "x", creative: "x", adhoc: "", proactive: "" },
            { name: "Cars2Cash", tier: "x", social: "x", ppc: "x", creative: "", adhoc: "", proactive: "" },
            { name: "Welwaze", tier: "x", social: "x", ppc: "", creative: "x", adhoc: "", proactive: "" },
            { name: "CBK", tier: "x", social: "x", ppc: "x", creative: "", adhoc: "", proactive: "" },
            { name: "iFind Leaks", tier: "x", social: "", ppc: "x", creative: "", adhoc: "", proactive: "" },
            { name: "Boss Leads LLC", tier: "x", social: "x", ppc: "x", creative: "x", adhoc: "", proactive: "" },
            { name: "FEAC Engineering", tier: "x", social: "", ppc: "", creative: "x", adhoc: "", proactive: "" },
            { name: "Helixiora", tier: "x", social: "", ppc: "x", creative: "x", adhoc: "", proactive: "" }
        ];

        // --- 2. ASSETS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Search: <g><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></g>,
                Trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                Edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />,
                Import: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></g>,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Check: <polyline points="20 6 9 17 4 12" />,
                Users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></g>,
                Rotate: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />,
                Alert: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 3. MAIN APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [clients, setClients] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [error, setError] = useState(null);
            
            const [showModal, setShowModal] = useState(false);
            const [showImport, setShowImport] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [csvInput, setCsvInput] = useState("");

            const [form, setForm] = useState({
                name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: ""
            });

            // Initial Auth
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    if (u) setUser(u);
                    else auth.signInAnonymously().catch(e => setError("Auth Error: " + e.message));
                });
                return () => unsub();
            }, []);

            // Data Stream + Automatic Baseline Seeding
            useEffect(() => {
                if (!user) return;
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                
                const unsub = ref.onSnapshot(async (snap) => {
                    if (snap.empty) {
                        // Automatically push baseline if empty
                        const batch = db.batch();
                        BASELINE_DATA.forEach(client => {
                            const newDoc = ref.doc();
                            batch.set(newDoc, { ...client, updatedAt: Date.now() });
                        });
                        await batch.commit();
                    }
                    setClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, err => {
                    console.error(err);
                    setError("Database error. Are Firestore Rules public? " + err.message);
                    setLoading(false);
                });
                return () => unsub();
            }, [user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                const data = { ...form, updatedAt: Date.now() };
                if (editingClient) await ref.doc(editingClient.id).update(data);
                else await ref.add(data);
                closeModal();
            };

            const closeModal = () => {
                setForm({ name: "", tier: "P2", social: "", ppc: "", creative: "", adhoc: "", proactive: "" });
                setEditingClient(null);
                setShowModal(false);
            };

            const forceRestoreBaseline = async () => {
                if (!confirm("This will overwrite existing data with the original baseline. Continue?")) return;
                const ref = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');
                
                // Clear current
                const snap = await ref.get();
                const batch = db.batch();
                snap.docs.forEach(doc => batch.delete(doc.ref));
                
                // Add baseline
                BASELINE_DATA.forEach(client => {
                    const newDoc = ref.doc();
                    batch.set(newDoc, { ...client, updatedAt: Date.now() });
                });
                
                await batch.commit();
                alert("Baseline Restored!");
            };

            const filteredClients = useMemo(() => {
                return clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()))
                              .sort((a, b) => a.tier.localeCompare(b.tier));
            }, [clients, searchTerm]);

            const getTierColor = (t) => {
                const tier = (t || "x").toUpperCase();
                if (tier.includes("P1")) return "text-purple-600 bg-purple-50";
                if (tier.includes("P2")) return "text-blue-600 bg-blue-50";
                if (tier.includes("P3")) return "text-cyan-600 bg-cyan-50";
                if (tier.includes("P4")) return "text-slate-600 bg-slate-50";
                return "text-slate-400 bg-slate-50";
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <div className="w-12 h-12 border-4 border-slate-100 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">PULLING MASTER MAP...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex items-center justify-center bg-red-50 p-6 text-center">
                    <div className="max-w-md bg-white p-10 rounded-[3rem] shadow-xl border border-red-100">
                        <Icon name="Alert" size={48} className="text-red-500 mx-auto mb-4" />
                        <h2 className="text-xl font-black text-slate-900 mb-2 uppercase">Configuration Required</h2>
                        <p className="text-sm text-slate-500 mb-6 leading-relaxed">{error}</p>
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest shadow-lg">Retry Connection</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col p-6 md:p-10 max-w-[1400px] mx-auto animate-in">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg shadow-indigo-100">
                                <Icon name="Users" size={28} />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter text-slate-900 uppercase leading-none">Client Map</h1>
                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 flex items-center gap-2 mt-2">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full"></span> 
                                    Baseline Active: {clients.length} Accounts
                                </p>
                            </div>
                        </div>
                        
                        <div className="flex w-full md:w-auto gap-3">
                            <div className="flex-1 md:w-80 flex items-center bg-white px-4 rounded-2xl border border-slate-200 shadow-sm focus-within:ring-2 ring-indigo-500/20 transition-all">
                                <Icon name="Search" className="text-slate-300 mr-2" />
                                <input type="text" placeholder="Filter map..." className="w-full py-4 text-sm font-semibold border-none focus:ring-0 bg-transparent" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setShowImport(true)} className="p-4 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-all shadow-sm" title="Import Options">
                                <Icon name="Import" size={20} className="text-slate-500" />
                            </button>
                            <button onClick={() => setShowModal(true)} className="bg-slate-900 text-white px-8 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-indigo-600 transition-all flex items-center gap-2">
                                <Icon name="Plus" size={16} /> Add Client
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredClients.map(client => (
                            <div key={client.id} className={`bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col relative transition-all hover:shadow-2xl group tier-${(client.tier || "x").toLowerCase().substring(0,2)}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${getTierColor(client.tier)}`}>
                                        {client.tier}
                                    </div>
                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={() => { setEditingClient(client); setForm(client); setShowModal(true); }} className="p-2 text-slate-300 hover:text-indigo-600 transition-colors"><Icon name="Edit" size={16}/></button>
                                        <button onClick={() => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients').doc(client.id).delete()} className="p-2 text-slate-300 hover:text-red-500 transition-colors"><Icon name="Trash" size={16}/></button>
                                    </div>
                                </div>

                                <h3 className="text-2xl font-black text-slate-900 mb-8 leading-tight tracking-tight">{client.name}</h3>

                                <div className="grid grid-cols-2 gap-x-6 gap-y-6 mb-8 flex-1">
                                    {['social', 'ppc', 'creative', 'adhoc'].map(field => (client[field] && client[field] !== 'x' && client[field] !== '') ? (
                                        <div key={field}>
                                            <p className="text-[9px] font-black uppercase text-slate-400 mb-1 tracking-widest leading-none">{field}</p>
                                            <p className="text-[11px] font-bold text-slate-600 leading-relaxed line-clamp-3">{client[field]}</p>
                                        </div>
                                    ) : null)}
                                </div>

                                <div className="mt-auto pt-6 border-t border-slate-50">
                                    <p className="text-[9px] font-black uppercase text-indigo-500 mb-2 tracking-widest flex items-center gap-2">
                                        <Icon name="Check" size={10} /> Proactive Strategy
                                    </p>
                                    <p className="text-xs text-slate-500 italic leading-relaxed bg-slate-50 p-4 rounded-2xl">
                                        {client.proactive || "No strategic initiatives recorded."}
                                    </p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* ENTRY MODAL */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden animate-in border border-white/20">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">{editingClient ? 'Update Account' : 'New Account'}</h2>
                                    <button onClick={closeModal} className="p-2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="X" size={24} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-10 grid grid-cols-2 gap-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest font-bold">Customer Name</label>
                                        <input required type="text" className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 font-bold" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest font-bold">Active Tier</label>
                                        <select className="w-full p-4 rounded-2xl bg-slate-50 border-none font-bold text-sm" value={form.tier} onChange={e => setForm({...form, tier: e.target.value})}>
                                            <option>P1</option>
                                            <option>P2</option>
                                            <option>P3</option>
                                            <option>P4</option>
                                            <option>{"x (Unranked)"}</option>
                                            <option>Inactive</option>
                                        </select>
                                    </div>
                                    {['social', 'ppc', 'creative', 'adhoc'].map(field => (
                                        <div key={field} className="col-span-2 md:col-span-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest font-bold capitalize">{field}</label>
                                            <textarea rows={2} className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-xs font-semibold" value={form[field]} onChange={e => setForm({...form, [field]: e.target.value})} />
                                        </div>
                                    ))}
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest font-bold">Strategic Goals</label>
                                        <textarea rows={3} className="w-full p-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 text-xs font-semibold" value={form.proactive} onChange={e => setForm({...form, proactive: e.target.value})} />
                                    </div>
                                    <button className="col-span-2 bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-xl hover:bg-indigo-600 transition-all mt-4">Save Mapping</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* IMPORT / RESTORE MODAL */}
                    {showImport && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl p-10 animate-in text-center">
                                <h2 className="text-2xl font-black uppercase tracking-tighter mb-4 leading-none">Database Tools</h2>
                                
                                <div className="bg-indigo-50/50 p-8 rounded-[2rem] border border-indigo-100 mb-8">
                                    <div className="inline-flex p-4 bg-indigo-600 text-white rounded-2xl mb-4"><Icon name="Rotate" size={24} /></div>
                                    <h3 className="font-black uppercase text-xs tracking-widest mb-2">Sync Spreadsheet Baseline</h3>
                                    <p className="text-xs text-slate-500 mb-6 leading-relaxed">Instantly load the 22 master accounts from your original CSV baseline file.</p>
                                    <button onClick={forceRestoreBaseline} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition-all">Restore Baseline Now</button>
                                </div>

                                <button onClick={() => setShowImport(false)} className="w-full p-5 rounded-3xl border border-slate-200 font-bold text-xs uppercase tracking-widest hover:bg-slate-50 transition-all">Return to Map</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
